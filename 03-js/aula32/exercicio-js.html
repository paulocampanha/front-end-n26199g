<!--
    Faça uma pagina HTML com JavaScript para imprimir no 
    console em sequência:
    Seu nome:
    Cidade onde você nasceu:
    Data do seu nascimento:
    Nome do seu pet (se tiver):
    ----
    No HTML coloque um cabeçalho com o texto:
    Exercicio de JavaScript
    e um paragrafo com o texto:
    O JavaScript será impresso no console. Aperte a tecla F2
-->
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício de JavaScript</title>
</head>
<body>
    <h1>Exercicio de JavaScript</h1>
    <p>O JavaScript será impresso no console. Aperte a tecla F2</p>
    <script>
        console.log("Nome: Paulo Campanha");
        console.log("Cidade de Nascimento: São Bernardo do Campo");
        console.log("Data: 29-07-1968");
        console.log("Pet: Bruce, Gaspar, Galego, Anabela, Luiza, Blue, Neve, Chorão, Xuxu");
    </script>
</body>
</html>
