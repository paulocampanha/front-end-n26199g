<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Calculadora para Dois Números</title>
    <link rel="stylesheet" href="mini-calculadora.css">
</head>
<body>
    
    <div class="container">
        <h1>Mini Calculadora</h1>
        <input type="number" id="num1" placeholder="Digite o 1º número">
        <input type="number" id="num2" placeholder="Digite o 2º número">

        <button onclick="calcularSoma()">Calcular Soma</button>
        <button onclick="calcularSubtracao()">Calcular Subtração</button>
        <button onclick="calcularMultiplicacao()">Calcular Multiplicação</button>
        <button onclick="calcularDivisao()">Calcular Divisão</button>

        <p id="displayResultado" class="resultado">Resultado: - </p>
    </div>

    <script src="mini-calculadora.js"></script>
</body>
</html>
