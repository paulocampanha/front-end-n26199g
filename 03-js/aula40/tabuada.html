<!-- Nessa página vamos solocitar ao usuário um número e 
 apresentar a tabuada desse número -->
<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabuada</title>
    <link rel="stylesheet" href="tabuada.css">
</head>

<body>
    <div class="container">
        <h1>Gerador de Tabuada</h1>

        <div class="controles">
            <input type="number" id="numeroTabuada" placeholder="Tabuado do...">
            <button onclick="gerarTabuada()">Gerar Tabuada</button>
        </div>

        <div id="resultadoTabuada"></div>
    </div>
    <script src="tabuada.js"></script>
</body>

</html>
